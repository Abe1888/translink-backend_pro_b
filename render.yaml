services:
  - type: web
    name: translink-backend-ioca
    env: node
    plan: starter

    # Build: type-check → compile frontend (dist/) → compile server (dist-server/)
    buildCommand: npm ci && npm run build

    # Start: run the compiled server directly
    startCommand: node dist-server/index.js

    # Render health check
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: GEMINI_API_KEY
        sync: false
        # ⚠ REQUIRED — set this secret in the Render dashboard.
        # Obtain from https://aistudio.google.com/apikey

      - key: APP_URL
        sync: false
        # ⚠ REQUIRED — set to your full Render service URL.
        # Example: https://translink-backend-ioca.onrender.com
        # Used for WebSocket origin validation and CORS.

      - key: ALLOWED_ORIGINS
        value: "*"
        # Comma-separated allowed origins for CORS and WebSocket.
        # Replace * with your exact domain(s) for tighter security.
        # Example: https://yourdomain.com,https://www.yourdomain.com

      - key: CMS_WRITE_TOKEN
        sync: false
        # Optional: set a secret token to protect CMS POST routes in production.
        # If set, all /api/config/* POST requests must include:
        #   Authorization: Bearer <token>  or  X-Admin-Token: <token>

      - key: ADMIN_API_TOKEN
        sync: false
        # Same as CMS_WRITE_TOKEN — used as a fallback if CMS_WRITE_TOKEN is not set.
